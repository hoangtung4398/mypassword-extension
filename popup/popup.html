<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyPassword</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    /* ---- Auth Screen ---- */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 480px;
      gap: 20px;
      padding: 32px;
    }
    .logo { font-size: 48px; }
    .app-name { font-size: 22px; font-weight: 700; color: #1e293b; }
    .tagline { font-size: 13px; color: #64748b; text-align: center; }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f1f5f9; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon { width: 20px; height: 20px; }

    /* ---- Vault Screen ---- */
    #vault-screen { display: none; flex-direction: column; height: 480px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .btn-icon {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }
    .btn-icon:hover { background: #f1f5f9; }
    .search-bar { padding: 10px 16px; background: white; border-bottom: 1px solid #e2e8f0; }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: #6366f1; }
    .vault-list { flex: 1; overflow-y: auto; padding: 8px; }
    .vault-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.1s;
    }
    .vault-item:hover { background: #f1f5f9; }
    .item-icon { font-size: 24px; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-add {
      margin: 8px 16px 16px;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: calc(100% - 32px);
    }
    .btn-add:hover { background: #4f46e5; }
    .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
    .error-msg { color: #ef4444; font-size: 12px; text-align: center; }
    .spinner { text-align: center; padding: 20px; color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="logo">🔐</div>
    <div class="app-name">MyPassword</div>
    <div class="tagline">Your zero-knowledge password manager</div>
    <button class="btn-google" id="btn-sign-in">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>
    <a href="auth-advanced.html" style="font-size: 13px; color: #6366f1; text-decoration: none; cursor: pointer;">
      Or sign in with email/password
    </a>
    <div class="error-msg" id="auth-error"></div>
  </div>

  <!-- Vault Screen -->
  <div id="vault-screen">
    <div class="header">
      <span class="header-title">🔐 MyPassword</span>
      <button class="btn-icon" id="btn-logout" title="Logout">⏏</button>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Search vault…" />
    </div>
    <div class="vault-list" id="vault-list">
      <div class="spinner">Loading…</div>
    </div>
    <button class="btn-add" id="btn-add">+ Add New Item</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
