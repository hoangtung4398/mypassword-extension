<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MyPassword - Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      padding: 24px;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 48px; margin-bottom: 8px; }
    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: #64748b;
      transition: color 0.15s;
    }
    .tab:hover { color: #1e293b; }
    .tab.active {
      border-bottom-color: #6366f1;
      color: #6366f1;
    }

    .form-group { margin-bottom: 16px; }
    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
    }
    .input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: #6366f1; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
    .success-msg {
      color: #10b981;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔐</div>
    <div class="app-name">MyPassword</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-screen="login">Sign In</button>
    <button class="tab" data-screen="register">Register</button>
  </div>

  <!-- Login Screen -->
  <div class="screen active" id="login-screen">
    <form id="login-form">
      <div class="form-group">
        <label class="label">Email</label>
        <input
          type="email"
          class="input"
          id="login-email"
          required
          autocomplete="email"
          placeholder="your.email@example.com"
        />
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input
          type="password"
          class="input"
          id="login-password"
          required
          autocomplete="current-password"
          placeholder="Enter your password"
        />
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Sign In</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>

  <!-- Register Screen -->
  <div class="screen" id="register-screen">
    <form id="register-form">
      <div class="form-group">
        <label class="label">Display Name</label>
        <input
          type="text"
          class="input"
          id="register-name"
          required
          maxlength="200"
          placeholder="Your Name"
        />
      </div>
      <div class="form-group">
        <label class="label">Email</label>
        <input
          type="email"
          class="input"
          id="register-email"
          required
          maxlength="256"
          autocomplete="email"
          placeholder="your.email@example.com"
        />
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input
          type="password"
          class="input"
          id="register-password"
          required
          autocomplete="new-password"
          placeholder="Create a strong password"
        />
        <div class="hint">8-128 characters, must have uppercase, lowercase, and number</div>
      </div>
      <button type="submit" class="btn-primary" id="btn-register">Create Account</button>
      <div class="error-msg" id="register-error"></div>
      <div class="success-msg" id="register-success"></div>
    </form>
  </div>

  <script type="module" src="auth-advanced.js"></script>
</body>
</html>
